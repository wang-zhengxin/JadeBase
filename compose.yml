services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: jadebase
      POSTGRES_USER: ${DB_USERNAME:-jadebase}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jadebase}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-jadebase} -d jadebase"]
      interval: 5s
      timeout: 3s
      retries: 10

  jadebase:
    build: .
    expose:
      - "8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/jadebase
      DB_USERNAME: ${DB_USERNAME:-jadebase}
      DB_PASSWORD: ${DB_PASSWORD:-jadebase}
      AUTH_SECURE_COOKIE: ${AUTH_SECURE_COOKIE:-false}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-${CONNECTOR_ENCRYPTION_KEY:-jadebase-local-credential-key-change-in-production}}
      CONNECTOR_ENCRYPTION_KEY: ${CONNECTOR_ENCRYPTION_KEY:-jadebase-local-connector-key-change-in-production}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-https://api.deepseek.com}
      MODEL_API_KEY: ${MODEL_API_KEY:-}
      CHAT_MODEL: ${CHAT_MODEL:-deepseek-chat}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v3}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      RAG_SEARCH_STORE: postgres
      RERANKER_BASE_URL: ${RERANKER_BASE_URL:-}
      RERANKER_API_KEY: ${RERANKER_API_KEY:-}
      RERANKER_MODEL: ${RERANKER_MODEL:-bge-reranker-v2-m3}
      FEISHU_SYNC_INTERVAL_MINUTES: ${FEISHU_SYNC_INTERVAL_MINUTES:-15}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      jadebase:
        condition: service_healthy

volumes:
  postgres_data:
