spring:
  application:
    name: jadebase
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/jadebase;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration/common,classpath:db/migration/{vendor}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

jadebase:
  auth:
    secure-cookie: ${AUTH_SECURE_COOKIE:false}
  security:
    credential-encryption-key: ${CREDENTIAL_ENCRYPTION_KEY:${CONNECTOR_ENCRYPTION_KEY:jadebase-local-credential-key-change-in-production}}
  model:
    base-url: ${MODEL_BASE_URL:https://api.deepseek.com}
    api-key: ${MODEL_API_KEY:}
    chat-model: ${CHAT_MODEL:deepseek-chat}
    embedding-base-url: ${EMBEDDING_BASE_URL:${MODEL_BASE_URL:https://api.deepseek.com}}
    embedding-api-key: ${EMBEDDING_API_KEY:${MODEL_API_KEY:}}
    embedding-model: ${EMBEDDING_MODEL:text-embedding-v3}
    embedding-dimensions: ${EMBEDDING_DIMENSIONS:384}
    reranker-base-url: ${RERANKER_BASE_URL:}
    reranker-api-key: ${RERANKER_API_KEY:}
    reranker-model: ${RERANKER_MODEL:bge-reranker-v2-m3}
  retrieval:
    top-k: ${RAG_TOP_K:6}
    candidate-k: ${RAG_CANDIDATE_K:30}
    rrf-k: ${RAG_RRF_K:60}
    search-store: ${RAG_SEARCH_STORE:local}
    rerank-enabled: ${RAG_RERANK_ENABLED:true}
    query-rewrite-enabled: ${RAG_QUERY_REWRITE_ENABLED:true}
  indexing:
    poll-delay-ms: ${INDEX_POLL_DELAY_MS:500}
    lease-seconds: ${INDEX_LEASE_SECONDS:60}
    recovery-delay-ms: ${INDEX_RECOVERY_DELAY_MS:10000}
  connectors:
    feishu:
      encryption-key: ${CONNECTOR_ENCRYPTION_KEY:jadebase-local-connector-key-change-in-production}
      api-base-url: ${FEISHU_API_BASE_URL:https://open.feishu.cn/open-apis}
      web-base-url: ${FEISHU_WEB_BASE_URL:https://feishu.cn}
      page-size: ${FEISHU_PAGE_SIZE:50}
      sync-interval-minutes: ${FEISHU_SYNC_INTERVAL_MINUTES:15}
      max-attempts: ${FEISHU_SYNC_MAX_ATTEMPTS:5}
      poll-delay-ms: ${FEISHU_SYNC_POLL_DELAY_MS:1000}
      lease-seconds: ${FEISHU_SYNC_LEASE_SECONDS:120}
      recovery-delay-ms: ${FEISHU_SYNC_RECOVERY_DELAY_MS:30000}
      allow-custom-base-url: ${FEISHU_ALLOW_CUSTOM_BASE_URL:false}
